<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>流动数据中枢</title>
    <style>
        :root { --bg: #f4f1eb; --card: #ffffff; --text-m: #788583; --text-l: #a5acaa; --primary: #a0b5a6; --border: #ece9e0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); color: var(--text-m); margin: 0; padding: 0; overflow-x: hidden; height: 100vh; }
        
        .header { background: var(--card); padding: 20px 20px; font-size: 18px; font-weight: 600; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.02); position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: center; }
        .header .back-btn { position: absolute; left: 20px; font-size: 14px; color: var(--primary); font-weight: normal; display: none; }
        
        .view { width: 100vw; height: calc(100vh - 65px); position: absolute; top: 65px; left: 0; transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); background: var(--bg); overflow-y: auto; padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
        #view-edit { transform: translateX(100%); background: var(--card); }
        
        .site-card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.03); display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); transition: transform 0.1s; }
        .site-card:active { transform: scale(0.98); }
        .site-domain { font-size: 16px; font-weight: 600; margin-bottom: 5px; }
        .site-stats { font-size: 12px; color: var(--text-l); }
        
        .fab { position: fixed; bottom: 30px; right: 30px; width: 56px; height: 56px; background: var(--primary); border-radius: 28px; display: flex; justify-content: center; align-items: center; color: white; font-size: 30px; box-shadow: 0 8px 20px rgba(160, 181, 166, 0.4); z-index: 20; }
        
        .form-group { margin-bottom: 20px; }
        .label { font-size: 12px; color: var(--text-l); margin-bottom: 8px; font-weight: 500; }
        input, select { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 14px 16px; border-radius: 12px; font-size: 15px; color: var(--text-m); outline: none; }
        input:focus, select:focus { border-color: var(--primary); }
        
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; text-align: center; margin-bottom: 15px; }
        .btn-primary { background: var(--primary); color: white; }
        
        .code-box { background: var(--bg); border-radius: 12px; padding: 15px; font-family: monospace; font-size: 12px; word-break: break-all; color: var(--text-m); border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="header">
        <div class="back-btn" id="btn-back" onclick="showList()">关闭</div>
        <span id="header-title">流动数据中枢</span>
    </div>

    <div id="view-list" class="view">
        <div id="card-container"></div>
        <div class="fab" onclick="showEdit('')">+</div>
    </div>

    <div id="view-edit" class="view">
        <div class="form-group">
            <div class="label">站点标识 (如: a.com)</div>
            <input type="text" id="f-site" placeholder="不可包含特殊字符">
        </div>
        <div class="form-group">
            <div class="label">前端对齐方式</div>
            <select id="f-align">
                <option value="left">靠左对齐</option>
                <option value="center" selected>居中对齐</option>
                <option value="right">靠右对齐</option>
            </select>
        </div>
        <div class="form-group"><div class="label">自定义名称: 总访问 PV</div><input type="text" id="f-pv" value="总访问"></div>
        <div class="form-group"><div class="label">自定义名称: 总访客 UV</div><input type="text" id="f-uv" value="总访客"></div>
        <div class="form-group"><div class="label">自定义名称: 今日访问 PV</div><input type="text" id="f-dpv" value="今日访问"></div>
        <div class="form-group"><div class="label">自定义名称: 今日访客 UV</div><input type="text" id="f-duv" value="今日访客"></div>
        
        <button class="btn btn-primary" onclick="saveConfig()">同步云端并生成</button>
        
        <div class="form-group" id="code-area" style="display:none;">
            <div class="label">拷贝下方代码插入网站</div>
            <div class="code-box" id="code-out"></div>
        </div>
    </div>

    <script>
        let configs = {};

        async function loadData() {
            const container = document.getElementById('card-container');
            container.innerHTML = '<div style="text-align:center; color:#a5acaa; margin-top:50px;">同步数据中...</div>';
            
            const res = await fetch('/stats?action=get_configs');
            configs = await res.json();
            
            container.innerHTML = '';
            for (let site in configs) {
                const statRes = await fetch(`/stats?action=get_stats&site=${site}`);
                const stats = await statRes.json();
                
                container.innerHTML += `
                <div class="site-card" onclick="showEdit('${site}')">
                    <div>
                        <div class="site-domain">${site}</div>
                        <div class="site-stats">今 PV: ${stats.dpv} · UV: ${stats.duv}</div>
                    </div>
                    <div style="color:#a0b5a6;">设置 ＞</div>
                </div>`;
            }
            if (Object.keys(configs).length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#a5acaa; margin-top:50px;">点击右下角添加你的第一个网站</div>';
            }
        }

        function showEdit(siteName) {
            document.getElementById('view-list').style.transform = 'translateX(-30%)';
            document.getElementById('view-edit').style.transform = 'translateX(0)';
            document.getElementById('btn-back').style.display = 'block';
            document.getElementById('header-title').innerText = siteName ? '站点配置' : '新建站点';
            document.getElementById('code-area').style.display = 'none';

            const conf = configs[siteName] || { pv: '总访问', uv: '总访客', dpv: '今日访问', duv: '今日访客', align: 'center' };
            document.getElementById('f-site').value = siteName;
            document.getElementById('f-site').disabled = !!siteName; 
            document.getElementById('f-align').value = conf.align;
            document.getElementById('f-pv').value = conf.pv;
            document.getElementById('f-uv').value = conf.uv;
            document.getElementById('f-dpv').value = conf.dpv;
            document.getElementById('f-duv').value = conf.duv;
        }

        function showList() {
            document.getElementById('view-list').style.transform = 'translateX(0)';
            document.getElementById('view-edit').style.transform = 'translateX(100%)';
            document.getElementById('btn-back').style.display = 'none';
            document.getElementById('header-title').innerText = '流动数据中枢';
        }

        async function saveConfig() {
            const site = document.getElementById('f-site').value.trim();
            if(!site) return alert("请输入站点标识");

            const payload = {
                site: site,
                align: document.getElementById('f-align').value,
                pv: document.getElementById('f-pv').value,
                uv: document.getElementById('f-uv').value,
                dpv: document.getElementById('f-dpv').value,
                duv: document.getElementById('f-duv').value
            };

            await fetch('/stats?action=save_config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            configs[site] = payload;
            
            const code = `<div id="cf-stat"></div>\n<script async src="${window.location.origin}/stats?action=script&site=${site}"><\/script>`;
            document.getElementById('code-out').innerText = code;
            document.getElementById('code-area').style.display = 'block';
            
            loadData();
        }

        loadData();
    </script>
</body>
</html>
